# 全局实验配置
global:
  seed: 42
  result_save_dir: "./data/processed"
  figure_save_dir: "./figures"
  log_dir: "./logs"
  repeat_times: 5  # 每个条件的重复实验次数

# 私有仓库配置
registry:
  address: "your-harbor-ip/cts-images"  # 替换为你的Harbor地址
  username: "admin"
  password: "Harbor12345"

# 网络环境配置
network:
  interface: "eth0"  # 替换为你的服务器网卡名

# 测试镜像列表
images:
  - name: "alpine"
    tag: "latest"
    size_mb: 5
  - name: "nginx"
    tag: "latest"
    size_mb: 140
  - name: "mysql"
    tag: "latest"
    size_mb: 500

# 三大核心实验场景
scenarios:
  iot_weak_network:
    name: "IoT弱网场景"
    bandwidth_mbps: 2
    delay_ms: 100
    loss_rate: 0.05
    cpu_cores: 0.2
    mem_limit_mb: 2048
  edge_network:
    name: "边缘网络场景"
    bandwidth_mbps: 20
    delay_ms: 50
    loss_rate: 0.01
    cpu_cores: 1.0
    mem_limit_mb: 4096
  cloud_datacenter:
    name: "云数据中心场景"
    bandwidth_mbps: 1000
    delay_ms: 1
    loss_rate: 0.001
    cpu_cores: 4.0
    mem_limit_mb: 8192

# 工业界通用基线配置
baseline:
  compression: "gzip"
  concurrent_downloads: 16
  chunk_size_kb: 64
  cpu_quota: -1  # 无限制

global:
  seed: 42
  result_save_dir: "./data/processed"
  figure_save_dir: "./figures"
  repeat_times: 5
  image_feature_csv: "./data/image_features_database.csv"  # ⚠️ 新增：指向你的CSV文件